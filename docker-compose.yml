services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phishing_project_app
    ports:
      - "5000:5000"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 5000
      APP_DEBUG: "false"
      OAUTHLIB_INSECURE_TRANSPORT: "1"
      OAUTHLIB_RELAX_TOKEN_SCOPE: "1"
      GMAIL_OAUTH_REDIRECT_URI: "http://localhost:5000/gmail_oauth_callback"
      GUNICORN_TIMEOUT: "180"
      GUNICORN_GRACEFUL_TIMEOUT: "30"
      GUNICORN_WORKERS: "1"
      GUNICORN_THREADS: "1"
      TOKEN_STORAGE_DIR: /app/runtime_tokens
      GMAIL_CREDENTIALS_FILE: /app/credentials.json
      ML_DASHBOARD_TRAIN_METADATA_ON_REQUEST: "false"
    volumes:
      - ./app.py:/app/app.py
      - ./gmail_client.py:/app/gmail_client.py
      - ./phishing_detector.py:/app/phishing_detector.py
      - ./templates:/app/templates
      - ./ML_model:/app/ML_model
      - ./runtime_tokens:/app/runtime_tokens
      - ./users.json:/app/users.json
      - ./credentials.json:/app/credentials.json:ro
    restart: unless-stopped
