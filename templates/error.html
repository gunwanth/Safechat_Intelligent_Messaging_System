<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentinel — Error</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='sentinel-logo.svg') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#f5f6fa;--surface:#fff;--surface-2:#f0f2fa;
            --ink:#0d0f1c;--ink-2:#2a2d42;--ink-3:#5a5f7a;--ink-4:#9498b0;
            --brand:#4f46e5;--brand-2:#6366f1;--brand-glow:rgba(79,70,229,.10);
            --success:#059669;--success-bg:#ecfdf5;--success-bd:#a7f3d0;
            --danger:#dc2626;--danger-bg:#fef2f2;--danger-bd:#fecaca;
            --bd:#e4e7f4;
            --grad-brand:linear-gradient(135deg,#4f46e5 0%,#7c3aed 50%,#a855f7 100%);
            --grad-danger:linear-gradient(135deg,#dc2626 0%,#f97316 100%);
            --sh-brand:0 8px 30px rgba(79,70,229,.22);
            --r-sm:8px;--r:14px;--r-lg:20px;
        }
        html{scroll-behavior:smooth}
        body{font-family:'Cabinet Grotesk',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
        body::before{content:"";position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 70% 50% at 0% 0%,rgba(220,38,38,.05) 0%,transparent 60%),radial-gradient(ellipse 60% 60% at 100% 80%,rgba(99,102,241,.04) 0%,transparent 60%);pointer-events:none}

        @keyframes slideInFromTop{from{opacity:0;transform:translateY(-24px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideInFromBottom{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
        @keyframes liveDot{0%,100%{box-shadow:0 0 0 0 rgba(5,150,105,.4)}50%{box-shadow:0 0 0 5px rgba(5,150,105,0)}}

        /* ══════════════════════════════════════════
           SENTINEL CREATIVE LOADER (High-Tech Version)
        ══════════════════════════════════════════ */
        #sentinel-loader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #0d0f1c; /* Deep Security Dark */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #sentinel-loader.active {
            opacity: 1;
            pointer-events: all;
        }

        .loader-visual {
            position: relative;
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .loader-ring-outer {
            position: absolute;
            inset: 0;
            border: 2px solid rgba(79, 70, 229, 0.05);
            border-top: 3px solid var(--brand);
            border-radius: 50%;
            animation: loader-spin 2.5s linear infinite;
        }

        .loader-ring-inner {
            position: absolute;
            inset: 15px;
            border: 2px solid rgba(168, 85, 247, 0.05);
            border-bottom: 3px solid #a855f7;
            border-radius: 50%;
            animation: loader-spin 1.8s linear infinite reverse;
        }

        .loader-shield {
            width: 72px;
            height: 72px;
            background: var(--grad-brand);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px var(--brand-glow);
            animation: shield-float 2s infinite ease-in-out;
            z-index: 2;
        }

        .loader-shield img {
            width: 40px;
            height: 40px;
            filter: brightness(0) invert(1);
        }

        .loader-scanline {
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--brand), transparent);
            box-shadow: 0 0 20px var(--brand);
            opacity: 0.6;
            z-index: 3;
            animation: loader-scan 2.2s infinite ease-in-out;
        }

        .loader-text-group {
            text-align: center;
            animation: slideInFromBottom 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
        }

        .loader-main-text {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
            color: #fff;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
        }

        .loader-sub-text {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            color: var(--brand-2);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            opacity: 0.8;
            animation: text-flicker 3s infinite;
        }

        @keyframes loader-spin { to { transform: rotate(360deg); } }
        
        @keyframes shield-float {
            0%, 100% { transform: translateY(0) scale(1); filter: brightness(1); }
            50% { transform: translateY(-12px) scale(1.08); filter: brightness(1.2); }
        }

        @keyframes loader-scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 0.8; }
            100% { top: 100%; opacity: 0; }
        }

        @keyframes text-flicker {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.4; }
            52% { opacity: 0.9; }
            54% { opacity: 0.5; }
        }

        /* NAV */
        .navbar{position:sticky;top:0;z-index:1000;background:rgba(255,255,255,.9);backdrop-filter:blur(20px) saturate(180%);border-bottom:1.5px solid var(--bd);box-shadow:0 1px 3px rgba(13,15,28,.06);animation:slideInFromTop .7s cubic-bezier(.16,1,.3,1)}
        .nav-container{max-width:1380px;margin:0 auto;padding:0 44px;height:70px;display:flex;align-items:center;justify-content:space-between;gap:32px}
        .nav-brand{display:flex;align-items:center;gap:12px;text-decoration:none}
        .brand-logo-wrap{width:40px;height:40px;border-radius:11px;background:var(--grad-danger);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 30px rgba(220,38,38,.2);overflow:hidden;flex-shrink:0}
        .brand-logo-wrap img{width:100%;height:100%;object-fit:contain;filter:brightness(0) invert(1)}
        .brand-copy{display:flex;flex-direction:column;gap:1px}
        .brand-name{font-size:1.2rem;font-weight:900;letter-spacing:-.03em;color:var(--danger);line-height:1.1}
        .brand-tag{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-4)}
        .back-link{padding:8px 16px;border-radius:var(--r-sm);text-decoration:none;font-weight:700;font-size:.85rem;color:var(--brand);background:var(--brand-glow);border:1.5px solid rgba(79,70,229,.2);transition:all .2s}
        .back-link:hover{background:rgba(79,70,229,.15)}

        /* ERROR CONTENT */
        .error-content{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 24px;position:relative;z-index:1}
        .error-card{text-align:center;max-width:520px;background:var(--surface);border:1.5px solid var(--bd);border-radius:var(--r-lg);padding:52px 44px;box-shadow:0 20px 60px rgba(13,15,28,.10);animation:slideInFromBottom .7s cubic-bezier(.16,1,.3,1) .1s both}
        .error-icon-wrap{width:80px;height:80px;border-radius:999px;background:var(--danger-bg);border:1.5px solid var(--danger-bd);display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin:0 auto 24px}
        .error-eyebrow{font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--danger);margin-bottom:8px}
        .error-card h2{font-size:2rem;font-weight:900;letter-spacing:-.03em;color:var(--ink);margin-bottom:12px}
        .error-card h2 em{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;color:var(--danger)}
        .error-msg{color:var(--ink-3);font-size:.95rem;line-height:1.7;margin-bottom:28px;background:var(--danger-bg);border:1.5px solid var(--danger-bd);border-radius:var(--r-sm);padding:14px 16px;text-align:left}
        .btn-back{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:var(--r-sm);border:none;background:var(--grad-brand);color:#fff;font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;text-decoration:none;transition:all .2s;box-shadow:0 4px 16px rgba(79,70,229,.25)}
        .btn-back:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(79,70,229,.38)}
        .action-stack{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

        @media(max-width:768px){.nav-container{flex-direction:column;height:auto;padding:16px 20px;gap:12px}.error-card{padding:32px 24px}}
    </style>
</head>
<body>
    <!-- ══ SENTINEL LOADER ════════════════════════ -->
    <div id="sentinel-loader">
        <div class="loader-visual">
            <div class="loader-ring-outer"></div>
            <div class="loader-ring-inner"></div>
            <div class="loader-scanline"></div>
            <div class="loader-shield">
                <img src="{{ url_for('static', filename='sentinel-logo.svg') }}" alt="Sentinel">
            </div>
        </div>
        <div class="loader-text-group">
            <div class="loader-main-text">
                <span>Sentinel Intelligence</span>
            </div>
            <div class="loader-sub-text">Neural Network Analysis in Progress</div>
        </div>
    </div>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <div class="brand-logo-wrap">
                    <img src="{{ url_for('static', filename='sentinel-logo.svg') }}" alt="Sentinel">
                </div>
                <div class="brand-copy">
                    <span class="brand-name">Error</span>
                    <span class="brand-tag">Sentinel Platform</span>
                </div>
            </div>
            <a href="{{ url_for('inbox') }}" class="back-link">← Back to Inbox</a>
        </div>
    </nav>

    <div class="error-content">
        <div class="error-card">
            <div class="error-icon-wrap">🚨</div>
            <div class="error-eyebrow">System Error</div>
            <h2>Something went <em>wrong</em></h2>
            <div class="error-msg">{{ msg }}</div>
            <div class="action-stack">
                {% if auth_url %}
                <a href="{{ auth_url }}" class="btn-back">{{ auth_label or 'Continue' }}</a>
                {% endif %}
                <a href="{{ url_for('inbox') }}" class="btn-back">Return to Inbox</a>
            </div>
        </div>
    </div>
    <script>
        /* Sentinel Loader Control */
        window.addEventListener('beforeunload', () => {
            document.getElementById('sentinel-loader').classList.add('active');
        });

        // Hide loader when page is shown (handles back/forward cache)
        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                document.getElementById('sentinel-loader').classList.remove('active');
            }
        });
    </script>
</body>
</html>
