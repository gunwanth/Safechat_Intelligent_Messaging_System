<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel — AI Security Platform</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='sentinel-logo.svg') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        :root{
            --bg:#f5f6fa;--surface:#fff;--surface-2:#f0f2fa;
            --ink:#0d0f1c;--ink-2:#2a2d42;--ink-3:#5a5f7a;--ink-4:#9498b0;
            --brand:#4f46e5;--brand-2:#6366f1;--brand-glow:rgba(79,70,229,.10);
            --success:#059669;--success-bg:#ecfdf5;--success-bd:#a7f3d0;
            --warning:#d97706;--warning-bg:#fffbeb;--warning-bd:#fde68a;
            --danger:#dc2626;--danger-bg:#fef2f2;--danger-bd:#fecaca;
            --bd:#e4e7f4;--bd-2:#c9cde8;
            --grad-brand:linear-gradient(135deg,#4f46e5 0%,#7c3aed 50%,#a855f7 100%);
            --grad-danger:linear-gradient(135deg,#dc2626 0%,#f97316 100%);
            --grad-safe:linear-gradient(135deg,#059669 0%,#10b981 100%);
            --sh-xs:0 1px 3px rgba(13,15,28,.06);--sh:0 8px 30px rgba(13,15,28,.10);--sh-lg:0 20px 60px rgba(13,15,28,.12);
            --sh-brand:0 8px 30px rgba(79,70,229,.22);
            --r-sm:8px;--r:14px;--r-lg:20px;
        }
        body{font-family:'Cabinet Grotesk',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;min-height:100vh;overflow-x:hidden}
        body::before{content:"";position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 70% 50% at 0% 0%,rgba(99,102,241,.07) 0%,transparent 60%),radial-gradient(ellipse 60% 60% at 100% 80%,rgba(168,85,247,.06) 0%,transparent 60%);pointer-events:none}

        @keyframes slideInFromTop{from{opacity:0;transform:translateY(-24px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideInFromBottom{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
        @keyframes liveDot{0%,100%{box-shadow:0 0 0 0 rgba(5,150,105,.4)}50%{box-shadow:0 0 0 5px rgba(5,150,105,0)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes cardReveal{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

        /* ══════════════════════════════════════════
           SENTINEL CREATIVE LOADER (High-Tech Version)
        ══════════════════════════════════════════ */
        #sentinel-loader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #0d0f1c; /* Deep Security Dark */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #sentinel-loader.active {
            opacity: 1;
            pointer-events: all;
        }

        .loader-visual {
            position: relative;
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .loader-ring-outer {
            position: absolute;
            inset: 0;
            border: 2px solid rgba(79, 70, 229, 0.05);
            border-top: 3px solid var(--brand);
            border-radius: 50%;
            animation: loader-spin 2.5s linear infinite;
        }

        .loader-ring-inner {
            position: absolute;
            inset: 15px;
            border: 2px solid rgba(168, 85, 247, 0.05);
            border-bottom: 3px solid #a855f7;
            border-radius: 50%;
            animation: loader-spin 1.8s linear infinite reverse;
        }

        .loader-shield {
            width: 72px;
            height: 72px;
            background: var(--grad-brand);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px var(--brand-glow);
            animation: shield-float 2s infinite ease-in-out;
            z-index: 2;
        }

        .loader-shield img {
            width: 40px;
            height: 40px;
            filter: brightness(0) invert(1);
        }

        .loader-scanline {
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--brand), transparent);
            box-shadow: 0 0 20px var(--brand);
            opacity: 0.6;
            z-index: 3;
            animation: loader-scan 2.2s infinite ease-in-out;
        }

        .loader-text-group {
            text-align: center;
            animation: slideInFromBottom 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
        }

        .loader-main-text {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
            color: #fff;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
        }

        .loader-sub-text {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            color: var(--brand-2);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            opacity: 0.8;
            animation: text-flicker 3s infinite;
        }

        @keyframes loader-spin { to { transform: rotate(360deg); } }
        
        @keyframes shield-float {
            0%, 100% { transform: translateY(0) scale(1); filter: brightness(1); }
            50% { transform: translateY(-12px) scale(1.08); filter: brightness(1.2); }
        }

        @keyframes loader-scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 0.8; }
            100% { top: 100%; opacity: 0; }
        }

        @keyframes text-flicker {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.4; }
            52% { opacity: 0.9; }
            54% { opacity: 0.5; }
        }

        /* NAVBAR */
        .navbar{position:sticky;top:0;z-index:1000;background:rgba(255,255,255,.9);backdrop-filter:blur(20px) saturate(180%);border-bottom:1.5px solid var(--bd);box-shadow:var(--sh-xs);animation:slideInFromTop .7s cubic-bezier(.16,1,.3,1)}
        .nav-container{max-width:1380px;margin:0 auto;padding:0 44px;height:70px;display:flex;align-items:center;justify-content:space-between;gap:32px}
        .nav-brand{display:flex;align-items:center;gap:12px;text-decoration:none}
        .brand-logo-wrap{width:40px;height:40px;border-radius:11px;background:var(--grad-brand);display:flex;align-items:center;justify-content:center;box-shadow:var(--sh-brand);overflow:hidden;flex-shrink:0}
        .brand-logo-wrap img{width:100%;height:100%;object-fit:contain;filter:brightness(0) invert(1)}
        .brand-copy{display:flex;flex-direction:column;gap:1px}
        .brand-name{font-size:1.2rem;font-weight:900;letter-spacing:-.03em;color:var(--ink);line-height:1.1}
        .brand-tag{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-4)}
        .nav-links{display:flex;align-items:center;gap:2px}
        .nav-link{padding:8px 16px;border-radius:var(--r-sm);text-decoration:none;font-weight:600;font-size:.85rem;color:var(--ink-3);transition:color .2s,background .2s}
        .nav-link:hover{color:var(--brand);background:var(--brand-glow)}
        .nav-link.active{color:var(--brand);background:var(--brand-glow)}
        .nav-link.logout,.nav-link.danger{color:var(--danger);background:var(--danger-bg);border:1.5px solid var(--danger-bd);margin-left:8px}
        .nav-link.logout:hover,.nav-link.danger:hover{background:#fee2e2;border-color:var(--danger)}
        .nav-live{display:inline-flex;align-items:center;gap:7px;background:var(--success-bg);border:1.5px solid var(--success-bd);color:var(--success);padding:6px 14px;border-radius:999px;font-family:'DM Mono',monospace;font-size:.68rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin-left:12px}
        .nav-live::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--success);animation:liveDot 1.8s ease-in-out infinite}
        .navbar-toggler{display:none;background:none;border:1.5px solid var(--bd);border-radius:var(--r-sm);padding:8px 10px;cursor:pointer;color:var(--ink-3);font-size:.9rem}

        /* CONTAINER */
        .container{max-width:1380px;margin:0 auto;padding:44px 44px 100px;position:relative;z-index:1;animation:slideInFromBottom .7s cubic-bezier(.16,1,.3,1) .15s both}

        /* TYPOGRAPHY */
        h1,h2,h3,h4{font-family:'Cabinet Grotesk',sans-serif;font-weight:900;letter-spacing:-.02em;color:var(--ink)}
        h1{font-size:2.2rem}h2{font-size:1.7rem}h3{font-size:1.3rem}h4{font-size:1.1rem}
        .eyebrow{font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--brand);margin-bottom:8px}
        em.serif{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;color:var(--brand-2)}

        /* CARDS */
        .card{background:var(--surface);border:1.5px solid var(--bd);border-radius:var(--r-lg);padding:24px;box-shadow:var(--sh-xs);transition:box-shadow .2s,border-color .2s;animation:cardReveal .5s cubic-bezier(.16,1,.3,1) both}
        .card:hover{box-shadow:var(--sh);border-color:var(--bd-2)}
        .card-header{background:var(--grad-brand);color:#fff;border-radius:var(--r-lg) var(--r-lg) 0 0;padding:16px 20px;font-weight:700;font-size:.9rem;margin:-24px -24px 20px}
        .card.danger{border-left:4px solid var(--danger)}
        .card.success{border-left:4px solid var(--success)}

        /* BUTTONS */
        .btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:var(--r-sm);font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;transition:transform .2s,box-shadow .2s,filter .2s;border:1.5px solid transparent;text-decoration:none;text-transform:none;letter-spacing:0}
        .btn-primary{background:var(--grad-brand);color:#fff;box-shadow:0 4px 16px rgba(79,70,229,.25)}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(79,70,229,.38);filter:brightness(1.05)}
        .btn-success{background:var(--grad-safe);color:#fff;box-shadow:0 4px 14px rgba(5,150,105,.2)}
        .btn-success:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(5,150,105,.3)}
        .btn-danger{background:var(--grad-danger);color:#fff;box-shadow:0 4px 14px rgba(220,38,38,.2)}
        .btn-danger:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(220,38,38,.32);filter:brightness(1.05)}
        .btn-secondary{background:var(--surface);border-color:var(--bd-2);color:var(--brand)}
        .btn-secondary:hover{background:var(--brand-glow);border-color:var(--brand)}
        .btn-info{background:rgba(79,70,229,.08);color:var(--brand);border-color:rgba(79,70,229,.2)}
        .btn-info:hover{background:rgba(79,70,229,.14)}

        /* ALERTS */
        .alert{border-radius:var(--r-sm);border:1.5px solid;border-left:4px solid;padding:13px 16px;margin-bottom:16px;font-size:.9rem;font-weight:600;animation:slideInFromBottom .4s cubic-bezier(.16,1,.3,1)}
        .alert-success{background:var(--success-bg);border-color:var(--success-bd);border-left-color:var(--success);color:var(--success)}
        .alert-danger{background:var(--danger-bg);border-color:var(--danger-bd);border-left-color:var(--danger);color:var(--danger)}
        .alert-warning{background:var(--warning-bg);border-color:var(--warning-bd);border-left-color:var(--warning);color:var(--warning)}
        .alert-info{background:rgba(79,70,229,.06);border-color:rgba(79,70,229,.2);border-left-color:var(--brand);color:var(--brand)}

        /* FORMS */
        .form-label{font-weight:700;color:var(--ink-2);margin-bottom:7px;font-size:.85rem;display:block}
        .form-control,.form-select{width:100%;padding:11px 14px;border-radius:var(--r-sm);border:1.5px solid var(--bd);background:var(--surface-2);color:var(--ink);font-family:'Cabinet Grotesk',sans-serif;font-size:.9rem;font-weight:500;transition:border-color .2s,box-shadow .2s}
        .form-control:focus,.form-select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(79,70,229,.12)}

        /* TABLE */
        .table{width:100%;border-collapse:collapse;color:var(--ink)}
        .table thead{background:var(--grad-brand)}
        .table thead th{color:#fff;font-family:'DM Mono',monospace;font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;font-weight:500;padding:11px 14px;border:none}
        .table tbody tr{border-bottom:1px solid var(--bd);transition:background .15s}
        .table tbody tr:hover{background:var(--surface-2)}
        .table tbody td{padding:11px 14px;font-size:.88rem;color:var(--ink-3);vertical-align:middle}
        .table-wrapper{overflow-x:auto;border-radius:var(--r-lg);border:1.5px solid var(--bd);box-shadow:var(--sh-xs)}

        /* BADGES */
        .badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:999px;font-family:'DM Mono',monospace;font-size:.68rem;font-weight:500;text-transform:uppercase;letter-spacing:.06em;border:1.5px solid}
        .badge-primary{background:rgba(79,70,229,.08);color:var(--brand);border-color:rgba(79,70,229,.2)}
        .badge-success{background:var(--success-bg);color:var(--success);border-color:var(--success-bd)}
        .badge-danger{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-bd)}
        .badge-warning{background:var(--warning-bg);color:var(--warning);border-color:var(--warning-bd)}

        /* SPINNER */
        .spinner-border{width:18px;height:18px;border:2px solid rgba(79,70,229,.2);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;vertical-align:middle}

        /* TEXT UTILITIES */
        .text-primary{color:var(--brand)!important}
        .text-danger{color:var(--danger)!important}
        .text-success{color:var(--success)!important}
        .text-muted{color:var(--ink-4)!important}

        /* SCROLLBAR */
        ::-webkit-scrollbar{width:8px;height:8px}
        ::-webkit-scrollbar-track{background:var(--surface-2)}
        ::-webkit-scrollbar-thumb{background:var(--bd-2);border-radius:4px}
        ::-webkit-scrollbar-thumb:hover{background:var(--brand-2)}
        ::selection{background:rgba(79,70,229,.15);color:var(--brand)}

        @media(max-width:1024px){.nav-container,.container{padding-left:28px;padding-right:28px}}
        @media(max-width:768px){.nav-container{flex-direction:column;height:auto;padding:16px 20px;gap:14px}.nav-links{width:100%;flex-wrap:wrap;justify-content:center}.container{padding:24px 18px 60px}}
    </style>
</head>

<body>
    <!-- ══ SENTINEL LOADER ════════════════════════ -->
    <div id="sentinel-loader">
        <div class="loader-visual">
            <div class="loader-ring-outer"></div>
            <div class="loader-ring-inner"></div>
            <div class="loader-scanline"></div>
            <div class="loader-shield">
                <img src="{{ url_for('static', filename='sentinel-logo.svg') }}" alt="Sentinel">
            </div>
        </div>
        <div class="loader-text-group">
            <div class="loader-main-text">Sentinel Intelligence</div>
            <div class="loader-sub-text">Scanning Neural Pathways...</div>
        </div>
    </div>
    <nav class="navbar">
        <div class="nav-container">
            <a class="nav-brand" href="/">
                <div class="brand-logo-wrap">
                    <img src="{{ url_for('static', filename='sentinel-logo.svg') }}" alt="Sentinel">
                </div>
                <div class="brand-copy">
                    <span class="brand-name">Sentinel</span>
                    <span class="brand-tag">AI Security</span>
                </div>
            </a>
            <div class="nav-links">
                {% if session.user_email %}
                    <a href="{{ url_for('inbox') }}"        class="nav-link">Inbox</a>
                    <a href="{{ url_for('ml_dashboard') }}" class="nav-link">ML Dashboard</a>
                    <a href="{{ url_for('sms_dashboard') }}" class="nav-link">SMS</a>
                    <span class="nav-live">Active</span>
                    <a href="{{ url_for('logout') }}"       class="nav-link logout">Logout</a>
                {% else %}
                    <a href="{{ url_for('login') }}" class="nav-link">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
        /* Sentinel Loader Control */
        window.addEventListener('beforeunload', () => {
            document.getElementById('sentinel-loader').classList.add('active');
        });

        // Hide loader when page is shown (handles back/forward cache)
        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                document.getElementById('sentinel-loader').classList.remove('active');
            }
        });
    </script>
</body>
</html>
